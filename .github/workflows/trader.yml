name: Trader Good - agente em tempo real

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trader-good
  cancel-in-progress: false

jobs:
  pulso:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar um pulso do agente
        run: python trader_good_gh.py

      - name: Salvar o estado novo de volta no repositório
        run: |
          git config user.name "trader-good-bot"
          git config user.email "actions@users.noreply.github.com"

          git add estado.json RELATORIO.md historico_operacoes.jsonl || true

          git diff --staged --quiet || git commit -m "pulso automático $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push